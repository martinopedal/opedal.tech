name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Top-level permissions are intentionally read-only. The deploy job
# escalates to `pages: write` and `id-token: write` only when it needs
# them, scoped to that job alone. The build job inherits read-only.
permissions:
  contents: read

# Per-ref concurrency so PR builds don't cancel each other or the main deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Setup Pages MUST run BEFORE the build so its `base_path` output can be
      # piped into the Astro build as GITHUB_PAGES_BASE_PATH. configure-pages
      # auto-detects the correct base ('/opedal.tech' on the github.io preview,
      # '/' once a CNAME is present and a custom domain is configured).
      - name: Setup Pages
        id: pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Build Astro site
        env:
          GITHUB_PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build
      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist/

      - name: Attest build provenance
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/**'

  linkcheck:
    name: Validate links
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages
          path: dist-artifact

      - name: Extract artifact
        run: |
          mkdir -p dist
          tar -xf dist-artifact/artifact.tar -C dist

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --no-progress --root-dir "${{ github.workspace }}/dist" --config lychee.toml "${{ github.workspace }}/dist"
          fail: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lychee-report
          path: lychee/out.md

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build, linkcheck]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Scope the privileged permissions to the one job that needs them.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ping IndexNow
        if: success()
        run: |
          # IndexNow: instant notification to Bing, Yandex, Naver for new content
          KEY=$(cat public/a24104b6-1047-4188-9969-8a2b6084adaf.txt)
          curl -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"opedal.tech\",
              \"key\": \"$KEY\",
              \"keyLocation\": \"https://opedal.tech/a24104b6-1047-4188-9969-8a2b6084adaf.txt\",
              \"urlList\": [
                \"https://opedal.tech/\",
                \"https://opedal.tech/about/\",
                \"https://opedal.tech/cv/\",
                \"https://opedal.tech/work/\",
                \"https://opedal.tech/blog/\",
                \"https://opedal.tech/contact/\",
                \"https://opedal.tech/martin-opedal/\",
                \"https://opedal.tech/people/martin-opedal/\"
              ]
            }" || echo "IndexNow ping failed (non-blocking)"
