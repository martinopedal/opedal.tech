name: Create setup issues

# Run once after the initial PR is merged to create all manual-setup tracking issues.
# Trigger manually: Actions → Create setup issues → Run workflow
on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            const issues = [
              {
                title: 'chore: enable GitHub Pages in repository settings',
                labels: ['chore'],
                body: `## Task

Enable GitHub Pages deployment so the site is served from \`opedal.tech\`.

## Steps

1. Go to **Settings → Pages**
2. Under **Source**, select **GitHub Actions** (not "Deploy from a branch")
3. Set custom domain: \`opedal.tech\` (pre-filled from the committed \`CNAME\` file)
4. ✅ Check **Enforce HTTPS**
5. Save

## Verify

- Trigger the **Build Astro site** workflow (Actions tab) or push to \`main\`
- Site loads at \`https://martinopedal.github.io/opedal.tech\` before DNS
- Site loads at \`https://opedal.tech\` once DNS is configured

## Notes

- The \`CNAME\` file is already committed — GitHub Pages reads it automatically
- GitHub will issue a free Let's Encrypt TLS cert once DNS resolves`,
              },
              {
                title: 'chore: configure branch protection on main',
                labels: ['chore'],
                body: `## Task

Configure branch protection rules for \`main\` to enforce CI gates and linear history.

## Steps

1. Go to **Settings → Branches → Add classic branch protection rule**
2. Branch name pattern: \`main\`
3. Apply these settings:

\`\`\`
✅ Require a pull request before merging
   Required approving reviews: 0  (solo-maintained)
✅ Require status checks to pass before merging
   Required checks:
     - Analyze (actions)          ← CodeQL workflow
     - Build Astro site           ← pages.yml build job
✅ Require branches to be up to date before merging
✅ Require linear history (no merge commits)
✅ Include administrators (enforce_admins)
❌ Require signed commits        (breaks Dependabot + API commits)
❌ Allow force pushes
❌ Allow deletions
\`\`\`

## Verify

- Open a test PR and confirm that merging is blocked until CI is green
- Confirm that direct pushes to \`main\` are rejected`,
              },
              {
                title: 'chore: configure Domeneshop DNS to point to GitHub Pages',
                labels: ['chore'],
                body: `## Task

Point the \`opedal.tech\` apex domain at GitHub Pages by updating DNS records in Domeneshop.

## Steps

1. Log in to [domeneshop.no](https://domeneshop.no)
2. Go to **DNS** for \`opedal.tech\`
3. Delete any existing A or AAAA records for the apex domain
4. Add these **A records**:

\`\`\`
A    opedal.tech    185.199.108.153
A    opedal.tech    185.199.109.153
A    opedal.tech    185.199.110.153
A    opedal.tech    185.199.111.153
\`\`\`

5. Add these **AAAA records** (IPv6):

\`\`\`
AAAA opedal.tech    2606:50c0:8000::153
AAAA opedal.tech    2606:50c0:8001::153
AAAA opedal.tech    2606:50c0:8002::153
AAAA opedal.tech    2606:50c0:8003::153
\`\`\`

6. Optional — www redirect:

\`\`\`
CNAME www.opedal.tech    martinopedal.github.io
\`\`\`

7. TTL: 3600 initially; lower to 300 during cutover if needed

## Notes

- DNS propagation typically takes 1–24 hours
- GitHub Pages issues the TLS certificate automatically once DNS resolves
- GitHub Pages must be enabled (see the **enable GitHub Pages** issue) before DNS cutover

## Verify

\`\`\`bash
dig opedal.tech +short
# Should return the 4 GitHub Pages IPs

curl -I https://opedal.tech
# Should return HTTP 200
\`\`\``,
              },
              {
                title: 'chore: enable security features (Dependabot, secret scanning, push protection)',
                labels: ['chore'],
                body: `## Task

Enable GitHub's security features for the repository.

## Steps

1. Go to **Settings → Security → Code security and analysis**
2. Enable:
   - ✅ **Dependency graph**
   - ✅ **Dependabot alerts**
   - ✅ **Dependabot security updates**
   - ✅ **Secret scanning**
   - ✅ **Push protection** (blocks commits containing secrets)
3. CodeQL runs automatically via \`.github/workflows/codeql.yml\` — no toggle needed

## Notes

- Dependabot will open PRs to update SHA-pinned GitHub Actions (configured in \`.github/dependabot.yml\`)
- Secret scanning protects against accidental credential commits
- Push protection gives an early warning before a secret reaches the remote`,
              },
              {
                title: 'chore: enable private vulnerability reporting',
                labels: ['chore'],
                body: `## Task

Enable GitHub's private vulnerability reporting so the link in \`SECURITY.md\` works.

## Steps

1. Go to **Settings → Security → Private vulnerability reporting**
2. Click **Enable**

## Why

The \`SECURITY.md\` file links to \`../../security/advisories/new\` for private reports.
Without this feature enabled, that link returns a 404.`,
              },
              {
                title: 'chore: create squad and workflow labels',
                labels: ['chore'],
                body: `## Task

Create the labels used by squad workflows and issue triage.
The \`auto-label-issues.yml\` workflow adds \`squad\` automatically on open,
but the label itself must exist first.

## Steps

Go to **Issues → Labels → New label** and create:

| Label | Color | Description |
|-------|-------|-------------|
| \`squad\` | \`#0075ca\` | Squad-tracked issue |
| \`copilot\` | \`#8957e5\` | Assigned to GitHub Copilot coding agent |
| \`enhancement\` | \`#a2eeef\` | New feature or section |
| \`content\` | \`#fef3c7\` | Text/copy update |
| \`bug\` | \`#d73a4a\` | Something broken |
| \`chore\` | \`#e4e669\` | Maintenance, CI, deps |
| \`documentation\` | \`#0075ca\` | Docs update |
| \`dependencies\` | \`#0366d6\` | Dependency update (Dependabot) |

## Notes

- \`squad\` must exist before the auto-label workflow runs, or it will fail silently
- GitHub creates a default set of labels on repo creation — delete or keep them as preferred`,
              },
              {
                title: 'chore: enable Copilot code review in repository settings',
                labels: ['chore'],
                body: `## Task

Enable Copilot automatic code review so the \`copilot-agent-pr-review.yml\` workflow
can request reviews from \`copilot-pull-request-reviewer\`.

## Steps

1. Go to **Settings → Copilot → Code review**
2. Click **Enable automatic code review** (or follow the UI prompt)

## Why

Without this setting, the reviewer-request POST in the workflow returns a 422 and
Copilot review threads won't appear on PRs.

## Verify

Open a test PR — the workflow should request \`copilot-pull-request-reviewer\` as a reviewer
within a few seconds of the PR being opened.`,
              },
            ];

            let created = 0;
            for (const issue of issues) {
              try {
                const { data } = await github.rest.issues.create({
                  ...repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels,
                });
                core.info(`Created issue #${data.number}: ${issue.title}`);
                created++;
              } catch (err) {
                core.error(`Failed to create "${issue.title}": ${err.message}`);
              }
            }
            core.info(`Created ${created}/${issues.length} issues.`);
