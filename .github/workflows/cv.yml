name: CV Build

# Triggers only on cv/** changes. Workflow runs on PR (uploads artifacts) and
# on push to main (commits PDFs back so pages.yml picks them up).

on:
  push:
    branches:
      - main
    paths:
      - 'cv/**'
  pull_request:
    branches:
      - main
    paths:
      - 'cv/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build CV PDFs
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml jinja2

      - name: Install LaTeX (texlive + latexmk)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-xetex \
            latexmk

      - name: Build CV PDFs
        run: python3 cv/build.py

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4
        with:
          name: cv-pdfs
          path: public/cv/architect-*.pdf
          retention-days: 30

  commit:
    name: Commit PDFs to main
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download PDFs from build job
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: cv-pdfs
          path: public/cv

      - name: Commit PDFs back to main
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: |
            chore(cv): rebuild architect PDFs

            Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>
          file_pattern: 'public/cv/*.pdf'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          skip_dirty_check: false

      # GITHUB_TOKEN pushes intentionally do not trigger downstream workflows
      # (GitHub anti-loop rule). Dispatch pages.yml so the new PDF actually
      # ships to opedal.tech without a manual nudge.
      - name: Trigger pages deploy
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main --repo "$GITHUB_REPOSITORY"
