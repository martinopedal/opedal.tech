name: CV Build

# Triggers only on cv/** changes. Workflow runs on PR (uploads artifacts) and
# on push to main (commits PDFs back so pages.yml picks them up).

on:
  push:
    branches:
      - main
    paths:
      - 'cv/**'
  pull_request:
    branches:
      - main
    paths:
      - 'cv/**'

permissions:
  contents: read

concurrency:
  group: cv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build CV PDFs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml jinja2

      - name: Compile CV PDFs with LaTeX
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3
        with:
          root_file: build.py
          working_directory: .
          compiler: python3
          args: cv/build.py

      - name: Upload PDFs as artifacts (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: public/cv/architect-*.pdf
          retention-days: 30

  commit:
    name: Commit PDFs to main
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml jinja2

      - name: Compile CV PDFs with LaTeX
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3
        with:
          root_file: build.py
          working_directory: .
          compiler: python3
          args: cv/build.py

      - name: Commit PDFs back to main
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: |
            chore(cv): rebuild architect PDFs

            Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>
          file_pattern: 'public/cv/architect-*.pdf'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          skip_dirty_check: false
